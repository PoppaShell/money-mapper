{% extends "base.html" %}

{% block title %}Settings - Money Mapper{% endblock %}

{% block content %}
<h1>{{ title }}</h1>

<div class="info">
    <strong>Settings:</strong> View Money Mapper configuration
</div>

<h2>Configuration</h2>
<form method="post">
    {% for option in options %}
        <label>{{ option.name }}</label>
        <input type="text" value="{{ option.value }}" placeholder="{{ option.name }}">
    {% endfor %}
    <button type="submit">Save Settings</button>
</form>

<h2>About</h2>
<div class="info">
    <p>Money Mapper v0.7.0</p>
</div>
{% endblock %}
