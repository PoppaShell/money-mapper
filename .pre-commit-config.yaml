repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: [src/]
        pass_filenames: false
        additional_dependencies:
          - types-toml
          - types-python-dateutil

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-r, src/, -ll]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        entry: python -m pip_audit --ignore-vuln CVE-2026-4539
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # actionlint runs in CI only (downloads native binary)
      # Local alternative: python -m actionlint_py .github/workflows/ci.yml
