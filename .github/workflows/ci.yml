# SYNC CONTRACT: This file and .local/scripts/check_all.ps1 must stay in sync.
# When you change one, change the other in the same commit.
# Commands must be identical: same tool, same flags, same order.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs when a new run is triggered (best practice)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Explicit permissions: principle of least privilege (GitHub Actions best practice)
permissions:
  contents: read  # Read-only access to repo contents
  checks: write  # Allow workflow to create status checks
  pull-requests: write  # Allow codecov to comment on PRs

jobs:
  # Lint with ruff (~30 seconds)
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with ruff
        run: ruff check src/

  # Check formatting with ruff (~30 seconds)
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Check formatting with ruff
        run: ruff format src/ --check

  # Type check with mypy (~60 seconds)
  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Type check with mypy
        run: mypy src/
        # All type errors fixed as of GHA best practices upgrade
        # Configuration: see pyproject.toml [tool.mypy]

  # Security checks (~30 seconds)
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Security check with bandit
        run: bandit -r src/ -ll

      - name: Audit dependencies with pip-audit
        run: pip-audit --ignore-vuln CVE-2026-4539
        # CVE-2026-4539 (pygments): No patched version available yet as of 2026-03-28
        # Remove this ignore when pygments releases a fix

  # Run tests with pytest (Python 3.11 & 3.12, ~120 seconds each)
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests with pytest
        run: pytest tests/ -v --tb=short

  # Coverage check (~60 seconds)
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests with coverage
        run: pytest tests/ --cov=src/money_mapper --cov-report=xml --cov-report=term-missing

      - name: Check test coverage
        run: coverage report --fail-under=36
        # Current: 36% coverage (baseline, enforced immediately)
        # Increment plan: 36% → 40% (after Category A bug fixes + tests) → 55% (after Phase 5 ML) → 60% (long-term)
        # Rationale: Prevents regression, forces new features to include tests
        # Each phase must include tests to raise the threshold without breaking CI

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # Validate GitHub Actions workflows (~30 seconds)
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash

      - name: Check workflow files
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash

  # Final gate: All checks passed
  all-checks:
    needs: [lint, format, type-check, security, test, coverage, actionlint]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify all CI checks passed
        run: echo "All CI checks passed successfully!"
